trigger: none
pool: Ankitpool
stages:
- stage: scanstage
  displayName: scan chal raha hai
  jobs:
  - job: 
    continueOnError: true
    steps:
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          Invoke-WebRequest -Uri "https://github.com/biomejs/biome/releases/download/%40biomejs%2Fbiome%402.3.11/biome-win32-x64.exe" -OutFile "$(Agent.ToolsDirectory)\biome.exe"

           & "$(Agent.ToolsDirectory)\biome.exe" lint "$(System.DefaultWorkingDirectory)"
- stage: buildstage
  jobs:
  - job: buildjob
    steps:
    - task: NodeAndNpmTool@1
      inputs:
        versionSpec: '18.x'
    - task: PowerShell@2
      inputs:
        targetType: 'inline'
        script: |
          npm install
          npm run build
        workingDirectory: '$(System.DefaultWorkingDirectory)'
